# Nginx Configuration for Security
# For erseco/alpine-php-webserver Docker container

# Location: Add this to your nginx configuration
# Usually in: /etc/nginx/conf.d/default.conf or similar

server {
    listen 8080;
    server_name _;
    root /app;
    index index.php index.html;

    # Deny access to configuration files
    location ~ ^/(config\.php|config\.example\.php|auth\.php|proxmox_api\.php)$ {
        deny all;
        return 403;
    }

    # Deny access to debug/utility files
    location ~ ^/(debug_|generate_|find_|check_).*\.php$ {
        deny all;
        return 403;
    }

    # Deny access to git files
    location ~ /\.git {
        deny all;
        return 403;
    }

    # Deny access to .htaccess (not needed for nginx but good practice)
    location ~ /\.htaccess {
        deny all;
        return 403;
    }

    # Deny access to markdown files
    location ~ \.(md|MD)$ {
        deny all;
        return 403;
    }

    # Deny access to hidden files (except .well-known for Let's Encrypt)
    location ~ /\. {
        deny all;
        return 403;
    }

    # Disable directory listing
    autoindex off;

    # Allow public PHP files
    location ~ ^/(index|admin|logout|status|actions)\.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/var/run/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Process other PHP files (fallback)
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/var/run/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Static files
    location / {
        try_files $uri $uri/ =404;
    }
}
